<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitLoop</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="start-seite" id="start-content">
    
    <div class="logo-box">
      <div class="logo-simpel">
        <span class="Habit-teil">Habit</span><span class="Loop-teil">Loop</span>
      </div>
    </div>
  
    <div class="start-box">
      <h2>Sind Sie bereit, Ihr Leben zu ändern?</h2>
      <div class="mein-leben-aendern">
        <a href="#" id="open-login" class="leben-aendern-btn anmelden-link">Mein Leben ändern!</a>
      </div>
    </div>
    
  </div>

  <div class="anmelde-overlay" id="login-overlay">
    <div class="anmelde-box">
      <h2 class="anmelde-h2">Anmelden</h2>
      <input type="text" class="eingabe-feld" placeholder="Benutzername">
      <input type="password" class="eingabe-feld" placeholder="Passwort">
      <a href="homepage.html" class="weiter-btn">Weiter</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
